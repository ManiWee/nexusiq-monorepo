version: '3.8'

services:
  api:
    build: 
      context: ./apps/api
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development

  web:
    build: 
      context: ./apps/web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - api

  ai:
    build:
      context: ./apps/ai
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai:/usr/src/app
    environment:
      - PYTHONUNBUFFERED=1